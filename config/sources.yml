sources:
  picoruby_trunk:
    repo: picoruby/picoruby
    branch: master
    clone_url: https://github.com/picoruby/picoruby
    repo_path: ~/.cache/trunk-changes-repos/picoruby
    source_diff: picoruby/picoruby:trunk/diff
    source_article: picoruby/picoruby:trunk/article
    prompt_supplement: "PicoRubyはマイコン向けRuby実装です。mrbgemsはPicoRuby/mrubyのgemシステムです。サブモジュール更新はコア言語機能やランタイムへの影響を考察してください。"

  cruby_trunk:
    repo: ruby/ruby
    branch: master
    clone_url: https://github.com/ruby/ruby
    repo_path: ~/.cache/trunk-changes-repos/ruby
    source_diff: ruby/ruby:trunk/diff
    source_article: ruby/ruby:trunk/article

  mruby_trunk:
    repo: mruby/mruby
    branch: master
    clone_url: https://github.com/mruby/mruby
    repo_path: ~/.cache/trunk-changes-repos/mruby
    source_diff: mruby/mruby:trunk/diff
    source_article: mruby/mruby:trunk/article

  rurema:
    doctree_path: ~/dev/src/github.com/rurema/doctree
    version: "4.0.0"

  picoruby_docs:
    repo_path: ~/dev/src/github.com/picoruby/picoruby

  # ruby/ruby trunk RDoc (en) → JP translation.
  # Data source: pre-built darkfish HTML tarball from cache.ruby-lang.org.
  # No ruby/ruby clone needed. No cache:prepare dependency.
  ruby_rdoc:
    url: https://cache.ruby-lang.org/pub/ruby/doc/ruby-docs-en-master.tar.xz

  ruby_wasm_docs:
    repo_path: ~/dev/src/github.com/ruby/ruby.wasm
